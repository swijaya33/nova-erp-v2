server:
  port: 4021

spring:
  application:
    name: nova-auth-service

  # --- Profile-based datasource config ---
  profiles:
    active: dev

  # Dev profile — H2 in-memory database (PostgreSQL compatibility mode)
  datasource:
    url: jdbc:h2:mem:nova_auth;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: false

  # H2 console for dev
  h2:
    console:
      enabled: true
      path: /h2-console

# --- JWT Configuration ---
jwt:
  secret: ${JWT_SECRET:nova-erp-v2-auth-service-secret-key-change-in-production-must-be-at-least-32-chars-long}
  access-token-expiration: 3600000    # 1 hour in milliseconds
  refresh-token-expiration: 604800000  # 7 days in milliseconds

# --- Eureka Client ---
eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# --- Actuator / Health Check ---
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
      show-components: always

# --- Logging ---
logging:
  level:
    com.novaerp.auth: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: DEBUG
